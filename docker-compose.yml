services:
  9router:
    image: decolua/9router:latest
    container_name: 9router
    restart: always
    ports:
      - "20128:20128"
    volumes:
      - 9router-data:/app/data
    env_file:
      - .env
    environment:
      DATA_DIR: /app/data
      PORT: "20128"
      HOSTNAME: "0.0.0.0"
      NODE_ENV: production
      HEADROOM_URL: http://headroom:8787
    depends_on:
      - headroom

  headroom:
    image: ghcr.io/chopratejas/headroom:latest
    container_name: headroom
    restart: always
    ports:
      - "8787:8787"

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: 9router-cloudflared
    restart: always
    command: tunnel --no-autoupdate run
    environment:
      # Untuk named tunnel (akun Cloudflare): isi TUNNEL_TOKEN dari dashboard Cloudflare
      # Untuk quick tunnel (tanpa akun): ganti command di atas menjadi:
      #   tunnel --no-autoupdate --url http://9router:20128
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - 9router

volumes:
  9router-data:
    name: 9router-data
